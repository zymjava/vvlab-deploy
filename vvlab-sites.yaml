# 三站点：使用阿里云上海个人版 ACR
# 镜像：crpi-c87ddoa33spg7s3f.cn-shanghai.personal.cr.aliyuncs.com/zzlab_imagespace/{zxy-repo|zym-repo|photo-repo}
# 私有仓库需在 demo 命名空间创建 acr-secret，并在下方启用 imagePullSecrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zym-site
  namespace: demo
  labels:
    app: zym-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zym-site
  template:
    metadata:
      labels:
        app: zym-site
    spec:
      containers:
        - name: site
          image: crpi-c87ddoa33spg7s3f.cn-shanghai.personal.cr.aliyuncs.com/zzlab_imagespace/zym-repo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: zym-site
  namespace: demo
spec:
  selector:
    app: zym-site
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zxy-site
  namespace: demo
  labels:
    app: zxy-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zxy-site
  template:
    metadata:
      labels:
        app: zxy-site
    spec:
      containers:
        - name: site
          image: crpi-c87ddoa33spg7s3f.cn-shanghai.personal.cr.aliyuncs.com/zzlab_imagespace/zxy-repo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: zxy-site
  namespace: demo
spec:
  selector:
    app: zxy-site
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photo-site
  namespace: demo
  labels:
    app: photo-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photo-site
  template:
    metadata:
      labels:
        app: photo-site
    spec:
      containers:
        - name: site
          image: crpi-c87ddoa33spg7s3f.cn-shanghai.personal.cr.aliyuncs.com/zzlab_imagespace/photo-repo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: photo-site
  namespace: demo
spec:
  selector:
    app: photo-site
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sites
  namespace: demo
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: zym.vvlab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zym-site
                port:
                  number: 80
    - host: zxy.vvlab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zxy-site
                port:
                  number: 80
    - host: photo.vvlab.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: photo-site
                port:
                  number: 80
